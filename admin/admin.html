<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin — KAIRO LEATHER</title><link rel="stylesheet" href="../assets/css/style.css"><style>.admin-page{max-width:1100px;margin:auto;padding:40px 22px}.admin-box{background:#fffaf4;border:1px solid var(--line);border-radius:24px;padding:24px;margin:20px 0}.admin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.admin-grid input,.admin-grid textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff}.admin-grid textarea{grid-column:1/-1;min-height:80px}.admin-list article{display:grid;grid-template-columns:80px 1fr auto;gap:16px;align-items:center;padding:14px 0;border-bottom:1px solid var(--line)}.admin-list img{width:80px;height:60px;object-fit:cover;border-radius:12px}.admin-actions button{margin:3px;border:0;border-radius:999px;padding:10px 14px;background:#111;color:white}.danger{background:#9a2d20!important}.login{max-width:420px;margin:80px auto}.hidden{display:none}@media(max-width:760px){.admin-grid{grid-template-columns:1fr}.admin-list article{grid-template-columns:1fr}}</style></head><body>
<div class="announcement"><span>Administration KAIRO LEATHER</span></div><header class="site-header"><a class="brand" href="../index.html"><img src="../assets/logo/logo.png" alt="KAIRO LEATHER"></a><nav class="main-nav"><a href="../index.html">Accueil</a><a href="../homme.html">Homme</a><a href="../femme.html">Femme</a></nav></header>
<main class="admin-page">
  <section id="login" class="admin-box login"><h1>Connexion admin</h1><p>Mot de passe par défaut : <b>admin123</b></p><input id="password" type="password" placeholder="Mot de passe" style="width:100%;padding:14px;border:1px solid var(--line);border-radius:12px"><button class="primary" id="loginBtn" style="margin-top:12px;border:0">Connexion</button><p id="loginError" style="color:#9a2d20;font-weight:800"></p></section>
  <section id="adminPanel" class="hidden"><h1>Gestion des produits</h1><div class="admin-box"><h2>Ajouter / modifier un bracelet</h2><div class="admin-grid"><input id="pid" type="hidden"><input id="name" placeholder="Nom"><select id="universe" style="width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff"><option value="homme">Homme</option><option value="femme">Femme</option><option value="mixte">Mixte</option></select><input id="price" type="number" step="0.10" placeholder="Prix"><input id="stock" type="number" placeholder="Stock"><input id="img" placeholder="Image ex: heritage.jpg"><input id="tag" placeholder="Badge ex: BEST SELLER"><input id="reviews" type="number" placeholder="Avis"><textarea id="desc" placeholder="Description"></textarea></div><button class="primary" id="saveBtn" style="border:0;margin-top:14px">Enregistrer</button><button class="secondary" id="resetBtn" style="border:1px solid var(--line);margin-top:14px">Nouveau</button></div><div class="admin-box"><h2>Produits</h2><div id="adminList" class="admin-list"></div></div></section>
</main><script src="admin.js"></script></body></html>
